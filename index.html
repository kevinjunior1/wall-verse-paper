<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Verse - Premium Wallpapers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Authentication Section -->
    <div id="authContainer" class="auth-container hidden">
        <div class="auth-card">
            <div class="auth-toggle">
                <button id="signInBtn" class="active">Sign In</button>
                <button id="signUpBtn">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <form id="signInForm" class="auth-form active">
                <h2>Welcome Back</h2>
                <input type="email" id="signInEmail" placeholder="Email" required>
                <input type="password" id="signInPassword" placeholder="Password" required>
                <button type="submit">Sign In</button>
                <p class="form-toggle">Don't have an account? <a href="#" onclick="toggleForms()">Sign Up</a></p>
            </form>

            <!-- Sign Up Form -->
            <form id="signUpForm" class="auth-form">
                <h2>Create Account</h2>
                <input type="text" id="signUpName" placeholder="Full Name" required>
                <input type="email" id="signUpEmail" placeholder="Email" required>
                <input type="password" id="signUpPassword" placeholder="Password (min 6 characters)" required minlength="6">
                <input type="password" id="signUpConfirm" placeholder="Confirm Password" required>
                <button type="submit">Create Account</button>
                <p class="form-toggle">Already have an account? <a href="#" onclick="toggleForms()">Sign In</a></p>
            </form>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="appContainer" class="app-container hidden">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-left">
                <h1 class="logo">🖼️ Wall Verse</h1>
            </div>
            <div class="nav-right">
                <span id="userGreeting" class="user-greeting"></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <section class="hero">
                <h2>Discover Beautiful Wallpapers</h2>
                <p>Curated collection of premium wallpapers for your devices</p>
            </section>

            <!-- Filter Section -->
            <div class="filter-section">
                <input type="text" id="searchInput" placeholder="Search wallpapers..." class="search-bar">
                <select id="categoryFilter" class="category-filter">
                    <option value="">All Categories</option>
                    <option value="nature">Nature</option>
                    <option value="abstract">Abstract</option>
                    <option value="technology">Technology</option>
                    <option value="minimalist">Minimalist</option>
                    <option value="landscape">Landscape</option>
                    <option value="space">Space</option>
                </select>
            </div>

            <!-- Wallpaper Gallery -->
            <div id="wallpaperGallery" class="gallery-grid">
                <!-- Wallpapers will be loaded here -->
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="spinner hidden"></div>

            <!-- No Results Message -->
            <div id="noResults" class="no-results hidden">
                <p>No wallpapers found. Try adjusting your search.</p>
            </div>
        </main>
    </div>

    <!-- Wallpaper Modal -->
    <div id="wallpaperModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img id="modalImage" src="" alt="Wallpaper">
            <div class="modal-actions">
                <button id="downloadBtn" class="download-btn">Download Wallpaper</button>
                <button id="viewSourceBtn" class="view-source-btn">View Source</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
